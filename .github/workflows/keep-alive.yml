name: Keep Render Alive

on:
  schedule:
    # ยิงทุกๆ 14 นาที
    - cron: '*/14 * * * *'
  # แนะนำให้ใส่คำสั่งนี้เพิ่มด้วยครับ จะทำให้เรากดปุ่มเทสปลุกเว็บด้วยตัวเองได้เลย
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render URL
        run: curl -s https://mini-tour.onrender.com > /dev/null
